<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Mobile-first viewport — prevents zoom on input focus on iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0" />

    <!-- Theme color for mobile browser chrome -->
    <meta name="theme-color" content="#570df8" />

    <!-- SEO / App meta -->
    <title>Marketplace – Shop Online</title>
    <meta name="description" content="A modern e-commerce marketplace. Browse products, shops, and categories." />
    <meta name="keywords" content="marketplace, shop, ecommerce, products, online shopping" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Marketplace – Shop Online" />
    <meta property="og:description" content="A modern e-commerce marketplace." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Marketplace" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
